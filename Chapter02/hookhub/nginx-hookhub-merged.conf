    location /audio/mermaid/ { alias /var/www/kindle-audio/mermaid/; autoindex on; add_header Accept-Ranges bytes; }
    location = /kindle-01.m3u { alias /var/www/kindle-audio/kindle-01.m3u; add_header Content-Type audio/x-mpegurl; }
    location /audio/kindle-01/ { alias /var/www/kindle-audio/kindle-01/; autoindex on; add_header Accept-Ranges bytes; }
