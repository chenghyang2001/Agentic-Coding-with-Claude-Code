    location = /kindle-22.m3u { alias /var/www/kindle-audio/kindle-22.m3u; add_header Content-Type audio/x-mpegurl; }
    location /audio/kindle-22/ { alias /var/www/kindle-audio/kindle-22/; autoindex on; add_header Accept-Ranges bytes; types { audio/mp4 m4a; audio/x-mpegurl m3u; } default_type application/octet-stream; }
    location = /kindle-23.m3u { alias /var/www/kindle-audio/kindle-23.m3u; add_header Content-Type audio/x-mpegurl; }
    location /audio/kindle-23/ { alias /var/www/kindle-audio/kindle-23/; autoindex on; add_header Accept-Ranges bytes; types { audio/mp4 m4a; audio/x-mpegurl m3u; } default_type application/octet-stream; }
    location = /kindle-24.m3u { alias /var/www/kindle-audio/kindle-24.m3u; add_header Content-Type audio/x-mpegurl; }
    location /audio/kindle-24/ { alias /var/www/kindle-audio/kindle-24/; autoindex on; add_header Accept-Ranges bytes; types { audio/mp4 m4a; audio/x-mpegurl m3u; } default_type application/octet-stream; }
    location = /kindle-25.m3u { alias /var/www/kindle-audio/kindle-25.m3u; add_header Content-Type audio/x-mpegurl; }
    location /audio/kindle-25/ { alias /var/www/kindle-audio/kindle-25/; autoindex on; add_header Accept-Ranges bytes; types { audio/mp4 m4a; audio/x-mpegurl m3u; } default_type application/octet-stream; }
    location = /agentic-coding.m3u { alias /var/www/kindle-audio/agentic-coding.m3u; add_header Content-Type audio/x-mpegurl; }
    location /agentic-coding/ { alias /var/www/kindle-audio/agentic-coding/; autoindex on; add_header Accept-Ranges bytes; types { audio/mp4 m4a; audio/x-mpegurl m3u; } default_type application/octet-stream; }

    # ── HookHub: Next.js 靜態資源快取 ────────────────────────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── HookHub: Next.js 主應用反向代理（catch-all）──────────
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    # ── 錯誤頁面 ─────────────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html { root /var/www/html; internal; }

    # ── 安全性標頭 ───────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
