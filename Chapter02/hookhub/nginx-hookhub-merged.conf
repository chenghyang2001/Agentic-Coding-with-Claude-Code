# Nginx 反向代理設定 — HookHub + Demo-17 合併版
# 合併日期：2026-05-26
# 說明：把 demo17.conf（Kindle audio + A2A）和 hookhub（Next.js port 3001）
#        合併成單一 virtual host，解決 server_name _ 衝突

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    client_max_body_size 10M;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    # ── Demo-17: A2A Agent 反向代理路徑 ─────────────────────
    location /drafter/      { proxy_pass http://127.0.0.1:18001/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /editor/       { proxy_pass http://127.0.0.1:8002/;  proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /critic/       { proxy_pass http://127.0.0.1:18003/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /notifier/     { proxy_pass http://127.0.0.1:8004/;  proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /orchestrator/ { proxy_pass http://127.0.0.1:8000/;  proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

    # ── Demo-17: Kindle 音訊靜態服務 ─────────────────────────
    location = /01-langgraph-02-code.m3u { alias /var/www/kindle-audio/01-langgraph-02-code.m3u; add_header Content-Type audio/x-mpegurl; }
    location /audio/01-langgraph-02-code/ { alias /var/www/kindle-audio/01-langgraph-02-code/; autoindex on; add_header Accept-Ranges bytes; }
    location = /04-claude-api-vs-cli.m3u { alias /var/www/kindle-audio/04-claude-api-vs-cli.m3u; add_header Content-Type audio/x-mpegurl; }
