    location /audio/kindle-19/ { alias /var/www/kindle-audio/kindle-19/; autoindex on; add_header Accept-Ranges bytes; types { audio/mp4 m4a; audio/x-mpegurl m3u; } default_type application/octet-stream; }
    location = /kindle-20.m3u { alias /var/www/kindle-audio/kindle-20.m3u; add_header Content-Type audio/x-mpegurl; }
