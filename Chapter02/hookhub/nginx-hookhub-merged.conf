    location = /kindle-03.m3u { alias /var/www/kindle-audio/kindle-03.m3u; add_header Content-Type audio/x-mpegurl; }
    location /audio/kindle-03/ { alias /var/www/kindle-audio/kindle-03/; autoindex on; add_header Accept-Ranges bytes; }
    location = /kindle-04.m3u { alias /var/www/kindle-audio/kindle-04.m3u; add_header Content-Type audio/x-mpegurl; }
    location /audio/kindle-04/ { alias /var/www/kindle-audio/kindle-04/; autoindex on; add_header Accept-Ranges bytes; }
    location = /kindle-05.m3u { alias /var/www/kindle-audio/kindle-05.m3u; add_header Content-Type audio/x-mpegurl; }
