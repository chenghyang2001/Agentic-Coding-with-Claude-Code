# ============================================================
# Nginx 反向代理設定 — HookHub（Next.js 15）
# ============================================================
#
# 這是參考模板，需手動安裝到 Nginx。安裝步驟如下：
#
#   1. 複製設定檔到 sites-available：
#      sudo cp nginx-hookhub.conf /etc/nginx/sites-available/hookhub
#
#   2. 建立軟連結啟用站台：
#      sudo ln -sf /etc/nginx/sites-available/hookhub \
#                  /etc/nginx/sites-enabled/hookhub
#
#   3. 移除預設站台（若會衝突）：
#      sudo rm -f /etc/nginx/sites-enabled/default
#
#   4. 測試設定語法：
#      sudo nginx -t
#
#   5. 重新載入 Nginx（不中斷連線）：
#      sudo nginx -s reload
#
#   6. 驗證服務可從外部存取：
#      curl http://187.127.109.145/
#
# 注意：若未來申請 SSL 憑證（Let's Encrypt），
#       需另外執行 certbot 並將 listen 80 改為 listen 443 ssl。
# ============================================================

server {
    # 監聽 IPv4 和 IPv6 的 HTTP port
    listen 80;
    listen [::]:80;

    # server_name 設為 _ 接受所有 hostname，避免 IP 硬編碼進 git 歷史
    server_name _;

    # ── 反向代理到 Next.js（PM2 守護，port 3001）──────────────
    location / {
        proxy_pass http://127.0.0.1:3001;

        # WebSocket 升級支援（Next.js HMR 在開發模式用到，生產備用）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # 傳遞原始主機名稱，Next.js 內部路由需要
        proxy_set_header Host $host;

        # 快取繞過：確保每次請求都回到 upstream，不被 Nginx 快取
        proxy_cache_bypass $http_upgrade;

        # 傳遞真實客戶端 IP，供 Next.js 記錄或限流使用
        proxy_set_header X-Real-IP $remote_addr;

        # 多層代理鏈中保留完整 IP 轉發歷史
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 告知後端原始協定（http/https），Next.js 可據此決定重導向 scheme
        proxy_set_header X-Forwarded-Proto $scheme;

        # ── Timeout 設定（避免 Next.js SSR 長時間渲染被截斷）──
        # 等待 upstream 回應的最長時間
        proxy_read_timeout 60s;
        # 與 upstream 建立連線的最長時間
        proxy_connect_timeout 10s;
        # 傳送請求到 upstream 的最長時間
        proxy_send_timeout 60s;
    }

    # ── 靜態資源快取（Next.js 建置產物）─────────────────────────
    # _next/static/ 包含 hash 化的 JS/CSS，檔名不同版本不同，
    # 可放心設長快取
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 靜態資源帶版本 hash，安全設定一年快取
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── 錯誤頁面（當 upstream 掛掉時顯示 502）────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        # 使用 Nginx 內建錯誤頁，不依賴後端
        root /var/www/html;
        internal;
    }

    # ── 安全性標頭（基本防護）──────────────────────────────────
    # 防止 MIME type 嗅探攻擊
    add_header X-Content-Type-Options "nosniff" always;
    # 防止點擊劫持（禁止其他網站用 iframe 嵌入）
    add_header X-Frame-Options "SAMEORIGIN" always;
    # 啟用 XSS 過濾器（舊版瀏覽器相容）
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self';" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
